name: memory-graph-maintainer
description: Periodically review memory topology graph — identify sparse clusters, isolated nodes, and suggest missing semantic connections
trigger:
  - cron: "*/30 * * * *"
concurrency: skip
budget:
  max_duration_secs: 180
  max_llm_cost_usd: 0.02
state:
  declared_keys: [last_review_signature]
tags: [memory, graph, topology, maintenance]

steps:
  # Fetch memory banks status to know what banks exist
  - id: fetch_status
    type: http
    method: GET
    url: http://127.0.0.1:8787/api/memory/status
    expect_json: true

  # Fetch the full bounded graph (all banks, 120 nodes)
  - id: fetch_graph
    type: http
    method: GET
    url: http://127.0.0.1:8787/api/memory/graph?limit=120
    expect_json: true

  - id: compute_stats
    type: transform
    body: |
      const graph = context.steps.fetch_graph.json;
      const status = context.steps.fetch_status.json;
      const nodes = graph.nodes || [];
      const edges = graph.edges || [];
      const connected = new Set();
      for (const e of edges) { connected.add(e.source); connected.add(e.target); }
      const isolated = nodes.length - connected.size;
      const byRelation = {};
      for (const e of edges) { byRelation[e.relation] = (byRelation[e.relation] || 0) + 1; }
      const signature = `${nodes.length}:${edges.length}:${isolated}:${JSON.stringify(byRelation)}`;
      const bankNames = (status.banks || []).map(b => b.bank);
      const topNodes = nodes
        .slice()
        .sort((a, b) => (b.importance ?? 0) - (a.importance ?? 0))
        .slice(0, 20)
        .map(n => ({ id: n.memoryId, kind: n.kind, importance: n.importance ?? 0, content: (n.content ?? '').slice(0, 120) }));
      return {
        analyze: signature !== context.state.last_review_signature,
        signature,
        stats: { nodes: nodes.length, edges: edges.length, isolated, byRelation },
        bankNames,
        topNodes,
      };

  # LLM step: review the graph and identify gaps
  - id: analyze
    type: agent
    when: steps.compute_stats.json.analyze === true
    timeout_secs: 120
    prompt: |
      You are reviewing a memory topology graph for quality. Identify:

      1. **Disconnected clusters** — groups of nodes with no edges between them
      2. **Isolated high-importance nodes** — important memories (importance > 0.7) with 0 connections
      3. **Missing semantic connections** — memories that clearly share a topic but lack an edge
      4. **Edge weight outliers** — suspiciously low weights on pairs that should be strongly related

      Graph stats: {{ steps.compute_stats.json.stats | json }}

      Banks: {{ steps.compute_stats.json.bankNames | json }}

      Node sample (top 20 by importance): {{ steps.compute_stats.json.topNodes | json }}

      Edge types and counts: {{ steps.compute_stats.json.stats.byRelation | json }}

      Produce exactly 4-8 bullets. Each bullet identifies ONE specific issue with concrete node IDs.
      If the graph is healthy (few isolated nodes, good connectivity), say "Graph health: GOOD" and skip details.
    on_failure: continue

  # Write the analysis to inbox so the user can act on it
  - id: write_report
    type: deck
    action: create_inbox_item
    when: steps.compute_stats.json.analyze === true
    kind: capture
    title: "Memory graph review - {{ run.date }}"
    source: routine:memory-graph-maintainer
    body: |
      # Memory graph review - {{ run.date }}

      Stats: {{ steps.compute_stats.json.stats.nodes }} nodes · {{ steps.compute_stats.json.stats.edges }} edges · {{ steps.compute_stats.json.stats.isolated }} isolated

      {{ steps.analyze.stdout }}

      ---
      _Generated by routine `memory-graph-maintainer` run {{ run.id }}_

  # Persist signature so we skip redundant analysis runs
  - id: persist_state
    type: set_state
    when: steps.compute_stats.json.analyze === true
    state:
      last_review_signature: "{{ steps.compute_stats.json.signature }}"
